<button class="theme-toggle" (click)="toggleTheme()">
  {{ isDarkMode ? '☀️ Light' : '🌙 Dark' }}
</button>

<div class="app-container">
  <header class="app-header">
    <h1>🎬 Six Degrees of Celebrity</h1>
    <p>Discover how any two celebrities are connected through the magic of six degrees of separation!</p>
  </header>

  <main class="main-content">
    <div class="search-sections">
      <div class="search-section">
        <h3>Start Celebrity</h3>
        <app-celebrity-search
          (celebritySelected)="onStartCelebritySelected($event)"
        ></app-celebrity-search>
        <app-celebrity-card
          *ngIf="startCelebrity"
          [celebrity]="startCelebrity"
        ></app-celebrity-card>
      </div>

      <div class="search-section">
        <h3>End Celebrity</h3>
        <app-celebrity-search
          (celebritySelected)="onEndCelebritySelected($event)"
        ></app-celebrity-search>
        <app-celebrity-card
          *ngIf="endCelebrity"
          [celebrity]="endCelebrity"
        ></app-celebrity-card>
      </div>
    </div>

    <app-loading-spinner 
      [loading]="loading" 
      message="Finding connection...">
    </app-loading-spinner>

    <div *ngIf="error" class="error-message">
      {{ error }}
    </div>

    <div class="controls" *ngIf="startCelebrity || endCelebrity">
      <button (click)="swapCelebrities()" [disabled]="!startCelebrity || !endCelebrity">
        🔄 Swap Celebrities
      </button>
      <button (click)="resetSearch()"> Reset Search</button>
    </div>

    <app-connection-path [connectionPath]="connectionPath"></app-connection-path>

    <div class="popular-celebrities" *ngIf="!connectionPath && popularCelebrities.length > 0">
      <h3>Popular Celebrities to Try</h3>
      <div class="celebrity-grid">
        <div
          *ngFor="let celebrity of popularCelebrities"
          class="celebrity-item"
          (click)="!startCelebrity ? onStartCelebritySelected(celebrity) : onEndCelebritySelected(celebrity)"
        >
          <app-celebrity-card [celebrity]="celebrity"></app-celebrity-card>
        </div>
      </div>
    </div>

    <footer class="app-footer">
    <div class="tmdb-attribution">
      <img src="assets/images/tmdb-logo.svg" alt="TMDB Logo" class="tmdb-logo">
      <p>This product uses the TMDB API but is not endorsed or certified by TMDB.</p>
    </div>
  </footer>

  </main>
</div>
